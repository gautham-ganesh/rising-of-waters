<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h2>Flood Risk Prediction System</h2>
                <p>Enter the latest weather and rainfall values to estimate flood danger.</p>
            </div>
            <a href="/" class="nav-link">Back to Home</a>
        </div>
        {% if error %}
        <div id="result" class="danger" style="display:block;">
            <div id="riskLevel">Error processing prediction.</div>
            <div id="probabilityText">{{ error }}</div>
        </div>
        {% endif %}

        <form id="predictionForm" action="/predict" method="post">
            <label for="temp">Average Temperature (°C):</label>
            <input type="number" id="temp" name="temp" step="0.1" required>

            <label for="humidity">Relative Humidity (%):</label>
            <input type="number" id="humidity" name="humidity" min="0" max="100" required>

            <label for="cloud_cover">Cloud Cover (%):</label>
            <input type="number" id="cloud_cover" name="cloud_cover" min="0" max="100" required>

            <label for="annual_rainfall">Annual Rainfall (mm):</label>
            <input type="number" id="annual_rainfall" name="annual_rainfall" step="0.1" required>

            <label for="jan_feb">Winter Rainfall (Jan-Feb) (mm):</label>
            <input type="number" id="jan_feb" name="jan_feb" step="0.1" required>

            <label for="mar_may">Summer Rainfall (Mar-May) (mm):</label>
            <input type="number" id="mar_may" name="mar_may" step="0.1" required>

            <label for="jun_sep">Monsoon Rainfall (Jun-Sep) (mm):</label>
            <input type="number" id="jun_sep" name="jun_sep" step="0.1" required>

            <label for="oct_dec">Autumn Rainfall (Oct-Dec) (mm):</label>
            <input type="number" id="oct_dec" name="oct_dec" step="0.1" required>

            <label for="avg_june">Average June Rainfall (mm):</label>
            <input type="number" id="avg_june" name="avg_june" step="0.1" required>

            <label for="sub_index">Sub-Division Basin Index:</label>
            <input type="number" id="sub_index" name="sub_index" step="0.1" required>

            <button type="submit">Check Flood Risk</button>
        </form>
        <div id="result">
            <div id="riskLevel"></div>
            <div id="probabilityText"></div>
        </div>
    </div>
</body>
</html>
